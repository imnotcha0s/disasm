{{- /* Tables get a horizontal scroll container so prose never scrolls sideways. */ -}}
<div class="table-scroll">
  <div class="table-scroll__inner">
    <table>
    <thead>
      {{- range .THead }}
      <tr>
        {{- range . }}
        <th scope="col" {{ with .Alignment }}style="text-align: {{ . }}"{{ end }}>{{ .Text }}</th>
        {{- end }}
      </tr>
      {{- end }}
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
        <td {{ with .Alignment }}style="text-align: {{ . }}"{{ end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
    </table>
  </div>
</div>
